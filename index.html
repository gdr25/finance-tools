<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzio Premium Finance Suite | Global Dashboard</title>
    
    <meta name="description" content="Optimize asset metrics with the Calzio high-performance global calculation engine. Featuring glassmorphic dashboards, live currency modules, real-time analytics, and advanced investment optimization models.">
    <meta name="keywords" content="EMI Calculator, SIP Calculator, GST Calculator, Retirement Planner, Crypto Profit, Stock Average, Inflation Calculator, Financial Dashboard">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        :root {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body.dark {
            --bg-master: #030303;
            --text-master: #f4f4f5;
            --glass-bg: rgba(15, 15, 23, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --nav-bg: rgba(3, 3, 3, 0.8);
            --panel-inner: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(24, 24, 27, 0.6);
            --text-muted: #a1a1aa;
        }

        body.light {
            --bg-master: #f8fafc;
            --text-master: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(15, 23, 42, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --panel-inner: rgba(241, 245, 249, 0.9);
            --input-bg: rgba(255, 255, 255, 0.9);
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-master);
            color: var(--text-master);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
        }

        .glass-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }

        .inner-panel {
            background: var(--panel-inner);
        }

        .themed-input {
            background: var(--input-bg);
            color: var(--text-master);
            border: 1px solid var(--glass-border);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(120, 119, 119, 0.15);
            height: 6px;
            border-radius: 9999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-element.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .voice-pulse {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="dark antialiased selection:bg-indigo-500/30">
    <div id="app-root"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const root = document.getElementById('app-root');
            
            let currentPage = 'home'; 
            let currentCurrency = 'INR';
            let globalChartInstance = null;
            let currentLang = 'EN';
            let activeSpeechInputId = null;

            // ==========================================
            // NEW USER MANAGEMENT & FEATURES SYSTEM
            // ==========================================
            let currentUser = JSON.parse(localStorage.getItem('calzio_logged_user')) || null;

            // Mock user DB storage structure initialization
            if(!localStorage.getItem('calzio_users_db')) {
                localStorage.setItem('calzio_users_db', JSON.stringify({}));
            }

            function syncUserSession() {
                if(currentUser) {
                    localStorage.setItem('calzio_logged_user', JSON.stringify(currentUser));
                    let db = JSON.parse(localStorage.getItem('calzio_users_db'));
                    db[currentUser.email] = currentUser;
                    localStorage.setItem('calzio_users_db', JSON.stringify(db));
                } else {
                    localStorage.removeItem('calzio_logged_user');
                }
            }

            window.logActivity = function(activityMessage) {
                if (!currentUser) return;
                currentUser.activities.unshift({
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    text: activityMessage
                });
                if(currentUser.activities.length > 15) currentUser.activities.pop();
                syncUserSession();
            };

            window.toggleFavorite = function(calculatorId, event) {
                if(event) event.stopPropagation();
                if (!currentUser) {
                    alert("Please sign in to save favorite templates.");
                    window.navigateRoute('auth');
                    return;
                }
                const idx = currentUser.favorites.indexOf(calculatorId);
                if(idx > -1) {
                    currentUser.favorites.splice(idx, 1);
                    window.logActivity(`Removed ${calculatorId.toUpperCase()} from favorites`);
                } else {
                    currentUser.favorites.push(calculatorId);
                    window.logActivity(`Added ${calculatorId.toUpperCase()} to favorites`);
                }
                syncUserSession();
                window.route(currentPage);
            };

            window.saveCalculationInstance = function(type, label, valueDetails) {
                if (!currentUser) {
                    alert("Sign in to store calculation matrices inside your stack footprint.");
                    return;
                }
                currentUser.savedCalculations.unshift({
                    id: Date.now(),
                    type: type,
                    label: label,
                    details: valueDetails,
                    date: new Date().toLocaleDateString()
                });
                window.logActivity(`Saved ${type.toUpperCase()} footprint: ${label}`);
                syncUserSession();
                alert("Calculation structure compiled and cached into account pool registry.");
            };

            window.deleteSavedCalculation = function(id) {
                if (!currentUser) return;
                currentUser.savedCalculations = currentUser.savedCalculations.filter(c => c.id !== id);
                window.logActivity(`Deleted saved metric token entry.`);
                syncUserSession();
                window.route(currentPage);
            };

            window.updateGoalTrack = function(id, progressInc) {
                if(!currentUser) return;
                let goal = currentUser.goals.find(g => g.id === id);
                if(goal) {
                    goal.current = Math.min(goal.target, goal.current + progressInc);
                    window.logActivity(`Updated goal progress for ${goal.name}`);
                    syncUserSession();
                    window.route(currentPage);
                }
            };

            const currencyConfigs = {
                INR: { symbol: '₹', locale: 'en-IN', rateVsUSD: 83.50 },
                USD: { symbol: '$', locale: 'en-US', rateVsUSD: 1.00 },
                EUR: { symbol: '€', locale: 'de-DE', rateVsUSD: 0.92 },
                GBP: { symbol: '£', locale: 'en-GB', rateVsUSD: 0.79 }
            };

            const i18n = {
                EN: {
                    tagline: "Institutional Level Financial Optimization Suite",
                    heroTitle: "Computational Intelligence For Advanced Asset Strategies",
                    heroDesc: "Simulate compound returns, tax liabilities, crypto allocations, retirement targets, and asset yields natively with sub-millisecond calculation loops.",
                    modulesTitle: "01 / Standard Core Modules",
                    advancedTitle: "02 / Advanced Investment & Finance Engine",
                    navHome: "HOME", downPdf: "Download PDF", shareResult: "Share Link", emailResult: "Email Results", voicePrompt: "Listening...", smartSugg: "Auto Suggestions Enabled"
                }
            };

            function formatMoney(amount) {
                const config = currencyConfigs[currentCurrency];
                return config.symbol + Math.round(amount).toLocaleString(config.locale);
            }

            function renderBaseLayout(innerContentHTML) {
                const t = i18n[currentLang];
                const isDark = document.body.classList.contains('dark');

                root.innerHTML = `
                    <div class="fixed top-0 left-1/4 w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] bg-indigo-600/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
                    <div class="fixed bottom-12 right-1/4 w-[250px] sm:w-[400px] h-[250px] sm:h-[400px] bg-emerald-600/5 rounded-full blur-[90px] pointer-events-none -z-10"></div>

                    <header class="sticky top-0 w-full glass-nav z-50 transition-all duration-300">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div class="flex items-center gap-2 font-extrabold text-base sm:text-xl tracking-tight bg-gradient-to-r from-indigo-500 via-indigo-300 to-emerald-400 bg-clip-text text-transparent cursor-pointer" id="logoClick">
                                <span class="p-1.5 bg-indigo-600/20 border border-indigo-500/30 rounded-xl text-indigo-400 text-xs sm:text-sm">CZ</span> CALZIO
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <button class="px-3 py-1.5 bg-zinc-800 hover:bg-indigo-600 text-white rounded-xl text-xs font-bold transition cursor-pointer shadow-lg" onclick="window.navigateRoute('home')">🏠 DASHBOARD</button>
                                
                                ${currentUser ? `
                                    <button class="px-3 py-1.5 bg-indigo-600/20 border border-indigo-500/40 text-indigo-400 rounded-xl text-xs font-bold transition cursor-pointer" onclick="window.navigateRoute('userdashboard')">👤 USER HUB</button>
                                ` : `
                                    <button class="px-3 py-1.5 bg-zinc-700 hover:bg-indigo-600 text-white rounded-xl text-xs font-bold transition cursor-pointer" onclick="window.navigateRoute('auth')">🔐 SIGN IN</button>
                                `}
                                
                                <button id="themeToggle" class="p-2 border border-black/10 dark:border-white/10 rounded-xl text-sm w-9 h-9 flex items-center justify-center cursor-pointer hover:bg-zinc-500/10 transition">
                                    ${isDark ? '☀️' : '🌙'}
                                </button>
                                <select id="currSelect" class="bg-zinc-100 dark:bg-zinc-900 border border-black/10 dark:border-white/10 rounded-xl text-xs font-mono px-2 py-2 focus:outline-none cursor-pointer">
                                    <option value="INR" ${currentCurrency === 'INR' ? 'selected' : ''}>INR (₹)</option>
                                    <option value="USD" ${currentCurrency === 'USD' ? 'selected' : ''}>USD ($)</option>
                                    <option value="EUR" ${currentCurrency === 'EUR' ? 'selected' : ''}>EUR (€)</option>
                                    <option value="GBP" ${currentCurrency === 'GBP' ? 'selected' : ''}>GBP (£)</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 py-6" id="exportablePdfArea">
                        ${innerContentHTML}
                    </main>

                    <footer class="border-t border-black/5 dark:border-white/5 py-6 px-4 text-center text-[10px] text-zinc-400 font-mono tracking-wider">
                        &copy; 2026 CALZIO FINANCIAL APP. POWERED BY STATIC HTML5 HIGH-SPEED COMPUTE MATRIX.
                    </footer>
                `;

                document.getElementById('logoClick').onclick = () => window.navigateRoute('home');
                document.getElementById('currSelect').onchange = (e) => {
                    currentCurrency = e.target.value;
                    window.navigateRoute(currentPage);
                };
                document.getElementById('themeToggle').onclick = () => {
                    document.body.classList.toggle('dark');
                    document.body.classList.toggle('light');
                    window.navigateRoute(currentPage);
                };

                setTimeout(initScrollReveal, 40);
                setupSmartSuggestions();
            }

            window.navigateRoute = function(targetPage) {
                window.route(targetPage);
            };

            window.route = function(targetPage) {
                currentPage = targetPage;
                if (globalChartInstance) {
                    globalChartInstance.destroy();
                    globalChartInstance = null;
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });

                const pages = {
                    home: renderHomePage, emi: renderEMIPanel, sip: renderSIPPanel, gst: renderGSTPanel,
                    converter: renderConverterPanel, eligibility: renderEligibilityPanel, fdrd: renderFDRDPanel,
                    tax: renderTaxPanel, hike: renderHikePanel, retirement: renderRetirementPanel,
                    mf: renderMFPanel, crypto: renderCryptoPanel, stockavg: renderStockAvgPanel,
                    compound: renderCompoundPanel, inflation: renderInflationPanel, savingsgoal: renderSavingsGoalPanel,
                    realestate: renderRealEstatePanel, rentalyield: renderRentalYieldPanel, breakeven: renderBreakEvenPanel,
                    networth: renderNetWorthPanel, ccemi: renderCCEMIPanel, debtpayoff: renderDebtPayoffPanel,
                    carloan: renderCarLoanPanel, prepayment: renderPrepaymentPanel,
                    auth: renderAuthPage, userdashboard: renderUserDashboardPage
                };

                if (pages[targetPage]) pages[targetPage]();
            };

            function initScrollReveal() {
                const elements = document.querySelectorAll('.reveal-element');
                elements.forEach(el => el.classList.add('active'));
            }

            function mountChartCanvas(p, y, pLabel = "Principal Base", yLabel = "Yield Pool") {
                setTimeout(() => {
                    const ctx = document.getElementById('dashboardChart');
                    if (!ctx) return;
                    globalChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: [pLabel, yLabel],
                            datasets: [{
                                data: [p, y],
                                backgroundColor: ['#6366f1', '#10b981'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            cutout: '75%'
                        }
                    });
                }, 60);
            }

            window.toggleVoiceInput = function(targetInputId) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert("Web Speech Engine not supported.");
                const btn = document.getElementById('voice-btn-' + targetInputId);
                
                if (activeSpeechInputId === targetInputId) {
                    activeSpeechInputId = null;
                    btn.classList.remove('voice-pulse', 'bg-red-500');
                    return;
                }
                activeSpeechInputId = targetInputId;
                const recognition = new SpeechRecognition();
                btn.classList.add('voice-pulse', 'bg-red-500');

                recognition.onresult = (event) => {
                    const cleanNumeric = event.results[0][0].transcript.replace(/[^0-9.]/g, '');
                    if (cleanNumeric) {
                        const input = document.getElementById(targetInputId);
                        input.value = cleanNumeric;
                        input.dispatchEvent(new Event('input'));
                    }
                };
                recognition.onend = () => { btn.classList.remove('voice-pulse', 'bg-red-500'); activeSpeechInputId = null; };
                recognition.start();
            };

            function setupSmartSuggestions() {
                document.querySelectorAll('.suggest-input').forEach(input => {
                    const id = input.id;
                    const container = document.getElementById('sugg-' + id);
                    if (!container) return;

                    input.addEventListener('focus', () => {
                        const val = parseFloat(input.value) || 1000;
                        container.innerHTML = `
                            <div class="absolute left-0 right-0 top-full mt-1 bg-white dark:bg-zinc-900 border border-black/10 dark:border-white/10 rounded-xl p-1 z-50 text-[10px] font-mono shadow-xl flex gap-1">
                                <button class="flex-1 p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(val * 0.75)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">75%</button>
                                <button class="flex-1 p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(val * 1.5)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">1.5x</button>
                                <button class="flex-1 p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(val * 2)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">2x</button>
                            </div>
                        `;
                    });
                    input.addEventListener('blur', () => setTimeout(() => container.innerHTML = '', 200));
                });
            }

            window.exportOutputToPdf = function() {
                html2pdf().from(document.getElementById('exportablePdfArea')).set({
                    margin: 0.2, filename: `Calzio_Suite_Report_${Date.now()}.pdf`,
                    html2canvas: { scale: 2 }, jsPDF: { format: 'letter', orientation: 'portrait' }
                }).save();
            };

            window.shareCoreAppResults = function() {
                const text = `Calzio Dashboard Analysis Module Output Verification Verified via secure local stack runtime loops.`;
                if (navigator.share) navigator.share({ title: 'Calzio Audit', text, url: window.location.href });
                else alert("Report footprint mirrored to clipboard stack array.");
            };

            window.emailCoreAppResults = function() {
                window.location.href = `mailto:?subject=Calzio%20Analytics%20Report&body=Metrics verified at gateway: ${window.location.href}`;
            };

            window.shareSocialAnchor = function(p) {
                let u = window.location.href;
                let url = p==='tw'?`https://twitter.com/intent/tweet?url=${u}`:`https://www.facebook.com/sharer/sharer.php?u=${u}`;
                window.open(url, '_blank', 'width=600,height=450');
            };

            function injectActionToolbelt() {
                return `
                    <div class="mt-6 pt-4 border-t border-black/5 dark:border-white/5 space-y-4">
                        <div class="flex flex-wrap gap-2 items-center justify-between">
                            <div class="flex flex-wrap gap-1.5">
                                <button onclick="window.exportOutputToPdf()" class="px-3 py-1.5 bg-indigo-600 text-white rounded-xl text-xs font-bold transition cursor-pointer">📄 Export PDF</button>
                                <button onclick="window.shareCoreAppResults()" class="px-3 py-1.5 bg-zinc-200 dark:bg-zinc-800 text-xs font-bold rounded-xl transition cursor-pointer">🔗 Copy Share Link</button>
                                <button onclick="window.emailCoreAppResults()" class="px-3 py-1.5 bg-zinc-200 dark:bg-zinc-800 text-xs font-bold rounded-xl transition cursor-pointer">✉️ Email Analytics</button>
                            </div>
                            <div class="flex gap-1 items-center bg-black/5 dark:bg-white/5 p-1 rounded-xl text-[10px] font-mono">
                                <span class="px-1 text-zinc-400">Broadcast Network:</span>
                                <button onclick="window.shareSocialAnchor('tw')" class="w-6 h-6 bg-indigo-500/10 rounded text-xs cursor-pointer">𝕏</button>
                                <button onclick="window.shareSocialAnchor('fb')" class="w-6 h-6 bg-indigo-500/10 rounded text-xs cursor-pointer">FB</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            function injectBackButton() {
                return `
                    <button onclick="window.navigateRoute('home')" class="mb-4 px-3 py-1.5 bg-black/5 hover:bg-black/10 dark:bg-white/5 dark:hover:bg-white/10 border border-black/10 dark:border-white/10 rounded-xl text-[10px] font-bold font-mono tracking-wider transition cursor-pointer inline-flex items-center gap-1.5">
                        ⬅ BACK TO DASHBOARD
                    </button>
                `;
            }

            // ========================================================
            // AUTHENTICATION INTERFACE MANAGER
            // ========================================================
            function renderAuthPage() {
                let html = `
                    <div class="max-w-md mx-auto space-y-6 pt-12 reveal-element">
                        <div class="glass-panel p-6 rounded-2xl space-y-4 shadow-xl">
                            <div class="text-center">
                                <h1 class="text-xl font-black bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">SECURE MATRIX ENTERPRISE LOCK</h1>
                                <p class="text-zinc-400 text-[10px] font-mono mt-1">Calzio Unified Profile Matrix Loop Sync</p>
                            </div>
                            
                            <button onclick="window.handleOAuthSimulation()" class="w-full py-2.5 rounded-xl border border-black/10 dark:border-white/10 bg-zinc-900/60 font-mono text-xs font-bold hover:bg-zinc-800 transition flex items-center justify-center gap-2 cursor-pointer shadow-md">
                                <svg class="w-4 h-4" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.29 1.53-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.65-5.17 3.65-8.58z"/>
                                    <path fill="#34A853" d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.08 1.16-3.13 0-5.78-2.11-6.73-4.96H1.21v3.15C3.18 21.88 7.31 24 12 24z"/>
                                    <path fill="#FBBC05" d="M5.27 14.24A7.16 7.16 0 0 1 5 12c0-.79.13-1.57.38-2.31V6.54H1.21A11.94 11.94 0 0 0 0 12c0 1.92.45 3.74 1.21 5.39l4.06-3.15z"/>
                                    <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.96 1.19 15.24 0 12 0 7.31 0 3.18 2.12 1.21 5.46l4.06 3.15c.95-2.85 3.6-4.96 6.73-4.96z"/>
                                </svg>
                                Authenticate via Google Session
                            </button>

                            <div class="relative flex py-1 items-center">
                                <div class="flex-grow border-t border-black/5 dark:border-white/5"></div>
                                <span class="flex-shrink mx-4 text-zinc-500 font-mono text-[9px]">OR LOCAL STACK</span>
                                <div class="flex-grow border-t border-black/5 dark:border-white/5"></div>
                            </div>

                            <div class="space-y-3">
                                <div>
                                    <label class="text-[9px] font-bold font-mono tracking-wider text-zinc-400 block uppercase">Identity Account Email</label>
                                    <input id="authEmail" type="email" placeholder="name@domain.com" class="themed-input w-full p-2 rounded-xl font-mono text-xs mt-1 focus:outline-indigo-500/50">
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold font-mono tracking-wider text-zinc-400 block uppercase">Security Hash Access Phase</label>
                                    <input id="authPass" type="password" placeholder="••••••••" class="themed-input w-full p-2 rounded-xl font-mono text-xs mt-1 focus:outline-indigo-500/50">
                                </div>
                                <div class="grid grid-cols-2 gap-2 pt-2">
                                    <button onclick="window.processFormAuth(true)" class="p-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-mono font-bold text-xs rounded-xl transition cursor-pointer shadow-lg">LOGIN</button>
                                    <button onclick="window.processFormAuth(false)" class="p-2.5 bg-zinc-800 hover:bg-zinc-700 font-mono font-bold text-xs rounded-xl transition cursor-pointer border border-white/5">REGISTER</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                renderBaseLayout(html);
            }

            window.processFormAuth = function(isLogin) {
                const em = document.getElementById('authEmail').value.trim();
                const pass = document.getElementById('authPass').value.trim();
                if(!em || !pass) return alert("Verify fields before submitting encryption request array.");

                let db = JSON.parse(localStorage.getItem('calzio_users_db'));
                if (isLogin) {
                    if (db[em] && db[em].pass === pass) {
                        currentUser = db[em];
                        syncUserSession();
                        window.logActivity("Authorized session entry point validated via form parameters.");
                        window.navigateRoute('userdashboard');
                    } else {
                        alert("Hash security validation error. Authentication credentials denied.");
                    }
                } else {
                    if (db[em]) return alert("Database registration intercept. Profile tag assignment already exists.");
                    db[em] = {
                        email: em, pass: pass, source: 'Local Matrix',
                        favorites: ['emi', 'sip'], savedCalculations: [], 
                        activities: [{ timestamp: '00:00', text: 'System matrix framework provisioning completed.' }],

                                <div class="flex justify-between"><span>Gross Settlement Value:</span><span id="o2" class="text-emerald-400 font-bold"></span></div>
                            </div>
                        </div>
                        ${injectActionToolbelt()}
                    </div>
                `;
                renderBaseLayout(html);
                const p = () => {
                    let val = Number(v1.value)||0; let r = Number(v2.value)||0;
                    let tax = val * (r/100);
                    document.getElementById('o1').textContent = formatMoney(tax);
                    document.getElementById('o2').textContent = formatMoney(val + tax);
                };
                [v1,v2].forEach(el=>el.addEventListener('input', p)); p();
            }

            // NOTE: Remaining standard calculators fallback handlers mapped via router execution loops.
            function renderConverterPanel() {
                let html = `
                    <div class="max-w-4xl mx-auto space-y-4 reveal-element">
                        ${injectBackButton()}
                        <h1 class="text-base font-black">Forex Conversion Grid</h1>
                        <div class="glass-panel p-4 rounded-2xl space-y-3">
                            <label class="text-[10px] font-bold font-mono text-zinc-400 uppercase flex justify-between">Volume <button id="voice-btn-v1" onclick="window.toggleVoiceInput('v1')">🎙️</button></label>
                            <input id="v1" type="number" value="100" class="themed-input w-full p-2 rounded-xl font-mono text-xs">
                            <p class="font-mono text-xs text-cyan-400 pt-2" id="o1"></p>
                        </div>
                        ${injectActionToolbelt()}
                    </div>
                `;
                renderBaseLayout(html);
                const p = () => {
                    let v = Number(v1.value)||0;
                    document.getElementById('o1').textContent = `Normalized Base Target Pipeline: $${(v * 1.08).toFixed(2)} USD value equivalents calculated.`;
                };
                v1.oninput = p; p();
            }

            // Router Initialization on main execution context
            window.route('home');
        });
    </script>
</body>
</html>
