<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clazio | Premium Global Finance Dashboard</title>
    
    <meta name="description" content="Optimize asset metrics with the Clazio high-performance global calculation engine. Featuring glassmorphic dashboards, live currency modules, real-time analytics, and investment optimization models.">
    <meta name="keywords" content="EMI Calculator, SIP Calculator, GST Calculator, Finance Dashboard, Tax Planning, Forex Engine, Fixed Deposit, Wealth Management, Clazio">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body {
            background-color: #030303;
            color: #f4f4f5;
            overflow-x: hidden;
        }

        /* Premium Glassmorphic Styles */
        .glass-panel {
            background: rgba(15, 15, 23, 0.45);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glass-nav {
            background: rgba(3, 3, 3, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-b: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* Customized High-Performance Range Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.08);
            height: 6px;
            border-radius: 9999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transition: transform 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Scroll Reveal and Custom Smooth Animation System */
        .reveal-element {
            opacity: 0;
            transform: translateY(24px);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-element.active {
            opacity: 1;
            transform: translateY(0);
        }
