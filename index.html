<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Optimize asset metrics with the Calzio high-performance global calculation engine. Featuring glassmorphic dashboards, live currency modules, real-time analytics, and advanced investment optimization models.">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body.dark {
            --bg-master: #030303;
            --text-master: #f4f4f5;
            --glass-bg: rgba(15, 15, 23, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --nav-bg: rgba(3, 3, 3, 0.8);
            --panel-inner: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(24, 24, 27, 0.6);
            --text-muted: #a1a1aa;
        }

        body.light {
            --bg-master: #f8fafc;
            --text-master: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(15, 23, 42, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --panel-inner: rgba(241, 245, 249, 0.9);
            --input-bg: rgba(255, 255, 255, 0.9);
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-master);
            color: var(--text-master);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
        }

        .glass-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }

        .inner-panel {
            background: var(--panel-inner);
        }

        .themed-input {
            background: var(--input-bg);
            color: var(--text-master);
            border: 1px solid var(--glass-border);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(120, 119, 119, 0.15);
            height: 6px;
            border-radius: 9999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-element.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .voice-pulse {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>

                    <div class="fixed bottom-12 right-1/4 w-[250px] sm:w-[400px] h-[250px] sm:h-[400px] bg-emerald-600/5 rounded-full blur-[90px] pointer-events-none -z-10"></div>

                window.route(targetPage);
            };

                currentPage = targetPage;
                if (globalChartInstance) {
                    globalChartInstance.destroy();
                    globalChartInstance = null;

            function setupSmartSuggestions() {
                document.querySelectorAll('.suggest-input').forEach(input => {
                    const id = input.id;
                    const container = document.getElementById('sugg-' + id);
                    if (!container) return;

                    input.addEventListener('focus', () => {
                        const val = parseFloat(input.value) || 1000;
                        container.innerHTML = `
                            <div class="absolute left-0 right-0 top-full mt-1 bg-white dark:bg-zinc-900 border border-black/10 dark:border-white/10 rounded-xl p-1 z-50 text-[10px] font-mono shadow-xl flex gap-1">

                                <button class="flex-1 p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(val * 1.5)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">1.5x</button>
                                <button class="flex-1 p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(val * 2)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">2x</button>
                            </div>
                        `;
                    });
                    input.addEventListener('blur', () => setTimeout(() => container.innerHTML = '', 200));
                });
            }

            window.computeAiHealthScore = function() {
                const inc = Number(document.getElementById('hIncome').value) || 1;
                const exp = Number(document.getElementById('hExpenses').value) || 0;
                const loan = Number(document.getElementById('hLoans').value) || 0;
                const sav = Number(document.getElementById('hSavings').value) || 0;

                const savingsRate = ((inc - exp - loan) / inc) * 100;
                const debtRatio = (loan / inc) * 100;
                const runwayMonths = sav / (exp + loan || 1);

                // Compute algorithmic score out of 100
                let baseScore = 40;
                if (savingsRate > 30) baseScore += 20;
                else if (savingsRate > 10) baseScore += 10;
                
                if (debtRatio < 35) baseScore += 20;
                else if (debtRatio < 50) baseScore += 10;

                if (runwayMonths >= 6) baseScore += 20;
                else if (runwayMonths >= 3) baseScore += 10;

                // Bind elements
                const scoreDisplay = document.getElementById('healthScoreDisplay');
                scoreDisplay.textContent = `${Math.min(baseScore, 100)} / 100`;

                const riskDisplay = document.getElementById('aiRisk');
                const budgetDisplay = document.getElementById('aiBudget');
                const savingsAdviceDisplay = document.getElementById('aiSavingsAdvice');

                // Evaluate score colors & insights
                if(baseScore >= 75) {
                    scoreDisplay.className = "text-4xl font-black text-emerald-400 mt-1 animate-pulse";
                    riskDisplay.textContent = "LOW RISK ASSET ALLOCATION";
                    riskDisplay.className = "font-bold text-emerald-400";
                    budgetDisplay.textContent = "Superb 50/30/20 balance footprint. Maintain current savings levels to cushion inflation vectors.";
                    savingsAdviceDisplay.textContent = "Deploy 15% of surplus capital into high-yield mutual funds and equity indices immediately.";
                } else if(baseScore >= 50) {
                    scoreDisplay.className = "text-4xl font-black text-amber-400 mt-1";
                    riskDisplay.textContent = "MODERATE VOLATILITY PROFILE";
                    riskDisplay.className = "font-bold text-amber-400";
                    budgetDisplay.textContent = "Your debt overheads are compounding. Consider standard snowball acceleration frameworks to compress leverage matrices.";
                    savingsAdviceDisplay.textContent = "Scale recurring savings reserves until you hit a firm 6-month structural run-rate buffer.";
                } else {
                    scoreDisplay.className = "text-4xl font-black text-rose-500 mt-1";
                    riskDisplay.textContent = "HIGH EXPOSURE CRITICAL RISK";
                    riskDisplay.className = "font-bold text-rose-400";
                    budgetDisplay.textContent = "Critical alert! Expenses and active liabilities exceed 85% of incoming pipeline streams.";
                    savingsAdviceDisplay.textContent = "Immediately freeze all variable allocations. Refinance active loans to increase structural safe limits.";
                }

                // Render dynamic doughnut chart using application context parameters
                mountChartCanvas(exp + loan, Math.max(0, inc - exp - loan), "Outflow Matrix", "Retained Liquidity Base");
            };

                        <div class="glass-panel p-6 rounded-2xl text-center text-xs text-zinc-400 font-mono">

                    </div>
                `;
                renderBaseLayout(html);
            }

            function mountChartCanvas(p, y, pLabel = "Principal Base", yLabel = "Yield Pool") {
                setTimeout(() => {
                    const ctx = document.getElementById('dashboardChart');
                    if (!ctx) return;
                    globalChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: [pLabel, yLabel],
                            datasets: [{
                                data: [p, y],
                                backgroundColor: ['#6366f1', '#10b981'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            cutout: '75%'
                        }
                    });
                }, 60);
            }

            // Init entry
            window.route('home');
        });
