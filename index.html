                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.05 });

            // Native Micro-Interaction Animated Counter Mechanics
            function animateNumericValue(elementId, endValue, prefix = '') {
                const el = document.getElementById(elementId);
                if (!el) return;
                
                let start = 0;
                const duration = 800; 
                const startTime = performance.now();
                
                function updateCounter(currentTime) {
                    const elapsedTime = currentTime - startTime;
                    if (elapsedTime >= duration) {
                        el.textContent = prefix + endValue.toLocaleString();
                        return;
                    }
                    const progress = elapsedTime / duration;
                    const easeOutQuad = progress * (2 - progress);
                    const currentVal = Math.floor(start + (endValue - start) * easeOutQuad);
                    el.textContent = prefix + currentVal.toLocaleString();
                    requestAnimationFrame(updateCounter);
                }
                requestAnimationFrame(updateCounter);
            }

                                    <button id="typeFD" class="flex-1 py-2 rounded-lg transition cursor-pointer bg-fuchsia-500 text-black">Fixed Deposit (FD)</button>
                                    <button id="typeRD" class="flex-1 py-2 rounded-lg transition cursor-pointer text-zinc-400 hover:text-white">Recurring Deposit (RD)</button>
                                </div>
                                <div>
                                    <label id="lblAmt" class="block text-[10px] sm:text-xs font-bold tracking-wider font-mono text-zinc-400 uppercase mb-2"></label>
                                    <input id="amt" type="number" inputmode="numeric" value="250000" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-sm sm:text-base focus:outline-none focus:border-fuchsia-500">
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[9px] sm:text-[10px] font-bold font-mono text-zinc-400 uppercase mb-1">Annual Yield Rate (%)</label>
                                        <input id="rate" type="number" step="0.05" value="7.25" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-xs sm:text-sm focus:outline-none focus:border-fuchsia-500">
                                    </div>
                                    <div>
                                        <label class="block text-[9px] sm:text-[10px] font-bold font-mono text-zinc-400 uppercase mb-1">Time Horizon (Years)</label>
                                        <input id="tenure" type="number" inputmode="numeric" value="5" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-xs sm:text-sm focus:outline-none focus:border-fuchsia-500">
                                    </div>
                                </div>
                            </div>

                            <div class="glass-panel p-4 sm:p-6 rounded-3xl flex flex-col justify-center space-y-3 sm:space-y-4 font-mono text-[11px] sm:text-xs text-zinc-400">
                                <div class="flex justify-between border-b border-white/5 pb-3"><span>Aggregated Assets Vested:</span><span id="pOut" class="text-white font-bold"></span></div>
                                <div class="flex justify-between border-b border-white/5 pb-3"><span>Statutory Yield Dividends:</span><span id="intOut" class="text-fuchsia-400 font-bold"></span></div>
                                <div class="flex justify-between pt-2 text-sm sm:text-base font-black"><span>Gross Maturity Valuation:</span><span id="matOut" class="text-emerald-400"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                renderBaseLayout(html);

                let mode = 'FD';
                const amt = document.getElementById('amt'); const rate = document.getElementById('rate');
                const tenure = document.getElementById('tenure'); const btnFD = document.getElementById('typeFD'); const btnRD = document.getElementById('typeRD');

                function process() {
                    const v = Number(amt.value) || 0; const r = Number(rate.value) / 100; const t = Number(tenure.value) || 0;
                    document.getElementById('lblAmt').textContent = mode === 'FD' ? 'Lump Sum Principal Base Asset' : 'Monthly Systematic Installment Allocation';

                    let principal = 0; let maturity = 0;

                    if (mode === 'FD') {
                        principal = v;
                        maturity = principal * Math.pow(1 + (r / 4), 4 * t);
                    } else {
                        const totalMonths = t * 12; principal = v * totalMonths;
                        let runningSum = 0;
                        for (let j = 1; j <= totalMonths; j++) {
                            runningSum += v * Math.pow(1 + (r / 4), 4 * ((totalMonths - j + 1) / 12));
                        }
                        maturity = runningSum;
                    }

                    const diffInterest = maturity - principal;
                    document.getElementById('pOut').textContent = formatMoney(principal);
                    document.getElementById('intOut').textContent = formatMoney(diffInterest);
                    document.getElementById('matOut').textContent = formatMoney(maturity);
                }

                btnFD.onclick = () => { mode = 'FD'; btnFD.className = 'flex-1 py-2 rounded-lg font-bold bg-fuchsia-500 text-black'; btnRD.className = 'flex-1 py-2 rounded-lg font-bold text-zinc-400 hover:text-white'; process(); };
                btnRD.onclick = () => { mode = 'RD'; btnRD.className = 'flex-1 py-2 rounded-lg font-bold bg-fuchsia-500 text-black'; btnFD.className = 'flex-1 py-2 rounded-lg font-bold text-zinc-400 hover:text-white'; process(); };

                [amt, rate, tenure].forEach(el => el.addEventListener('input', process)); process();
            }

            // 7. DASHBOARD STYLE PANEL: TAX CALCULATOR
            function renderTaxPanel() {
                const html = `
                    <div class="max-w-4xl mx-auto space-y-4 sm:space-y-6 reveal-element">
                        <div class="flex flex-row justify-between items-center gap-2 border-b border-white/5 pb-4">
                            <div>
                                <h1 class="text-xl sm:text-2xl font-black text-white">Statutory Income Progressive Tax Terminal</h1>
                                <p class="hidden sm:block text-xs text-zinc-400 mt-1">Estimates core progressive marginal bracket liabilities.</p>
                            </div>
                            <button onclick="window.navigateRoute('home')" class="text-[10px] sm:text-xs font-semibold px-3 py-1.5 sm:px-4 sm:py-2 border border-white/10 rounded-xl hover:bg-white/5 transition cursor-pointer whitespace-nowrap">← HUB</button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                            <div class="glass-panel p-4 sm:p-6 rounded-3xl space-y-4 flex flex-col justify-center">
                                <div>
                                    <label class="block text-[10px] sm:text-xs font-bold tracking-wider font-mono text-zinc-400 uppercase mb-2">Total Gross Assessable Revenue (Annual)</label>
                                    <input id="grossInc" type="number" inputmode="numeric" value="1800000" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-sm sm:text-base focus:outline-none focus:border-rose-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] sm:text-xs font-bold tracking-wider font-mono text-zinc-400 uppercase mb-2">Statutory Deductions / Exemptions Allowed</label>
                                    <input id="deduct" type="number" inputmode="numeric" value="200000" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-sm sm:text-base focus:outline-none focus:border-rose-500">
                                </div>
                            </div>

                            <div class="glass-panel p-4 sm:p-6 rounded-3xl flex flex-col justify-center space-y-3 sm:space-y-4 font-mono text-[11px] sm:text-xs text-zinc-400">
                                <div class="flex justify-between border-b border-white/5 pb-3"><span>Adjusted Net Taxable Bracket:</span><span id="taxNet" class="text-white font-bold"></span></div>
                                <div class="flex justify-between border-b border-white/5 pb-3"><span>Calculated Liability Surcharge:</span><span id="taxDue" class="text-rose-400 font-bold"></span></div>
                                <div class="flex justify-between pt-2 text-sm sm:text-base font-black"><span>Effective Liquid Take-Home Pay:</span><span id="takeHome" class="text-emerald-400"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                renderBaseLayout(html);

                const grossInc = document.getElementById('grossInc'); const deduct = document.getElementById('deduct');

                function process() {
                    const totalGross = Number(grossInc.value) || 0; const exemptions = Number(deduct.value) || 0;
                    const netIncome = Math.max(0, totalGross - exemptions);

                    let computedTax = 0;
                    if (currentCurrency === 'INR') {
                        // Classical India Progressive Tax Slab Schedule Logic
                        if (netIncome > 1500000) computedTax += (netIncome - 1500000) * 0.30 + 150000;
                        else if (netIncome > 1200000) computedTax += (netIncome - 1200000) * 0.20 + 90000;
                        else if (netIncome > 900000) computedTax += (netIncome - 900000) * 0.15 + 45000;
                        else if (netIncome > 600000) computedTax += (netIncome - 600000) * 0.10 + 15000;
                        else if (netIncome > 300000) computedTax += (netIncome - 300000) * 0.05;
                    } else {
                        // Global Multi-Bracket Flat Scaled Baseline
                        if (netIncome > 120000) computedTax += (netIncome - 120000) * 0.33 + 16000;
                        else if (netIncome > 60000) computedTax += (netIncome - 60000) * 0.20 + 4000;
                        else if (netIncome > 15000) computedTax += (netIncome - 15000) * 0.10;
                    }

                    document.getElementById('taxNet').textContent = formatMoney(netIncome);
                    document.getElementById('taxDue').textContent = formatMoney(computedTax);
                    document.getElementById('takeHome').textContent = formatMoney(totalGross - computedTax);
                }

                [grossInc, deduct].forEach(el => el.addEventListener('input', process)); process();
            }

            // 8. DASHBOARD STYLE PANEL: SALARY HIKE CALCULATOR
            function renderHikePanel() {
                const html = `
                    <div class="max-w-4xl mx-auto space-y-4 sm:space-y-6 reveal-element">
                        <div class="flex flex-row justify-between items-center gap-2 border-b border-white/5 pb-4">
                            <div>
                                <h1 class="text-xl sm:text-2xl font-black text-white">Revenue Growth & Compensation Optimizer</h1>
                                <p class="hidden sm:block text-xs text-zinc-400 mt-1">Audit precise corporate compensation surges and annualized growth deltas.</p>
                            </div>
                            <button onclick="window.navigateRoute('home')" class="text-[10px] sm:text-xs font-semibold px-3 py-1.5 sm:px-4 sm:py-2 border border-white/10 rounded-xl hover:bg-white/5 transition cursor-pointer whitespace-nowrap">← HUB</button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                            <div class="glass-panel p-4 sm:p-6 rounded-3xl space-y-4 flex flex-col justify-center">
                                <div>
                                    <label class="block text-[10px] sm:text-xs font-bold tracking-wider font-mono text-zinc-400 uppercase mb-2">Current Base Compensation</label>
                                    <input id="currSal" type="number" inputmode="numeric" value="800000" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-sm sm:text-base focus:outline-none focus:border-teal-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] sm:text-xs font-bold tracking-wider font-mono text-zinc-400 uppercase mb-2">Proposed Evaluation Target</label>
                                    <input id="newSal" type="number" inputmode="numeric" value="1150000" class="w-full bg-zinc-900/60 border border-white/10 rounded-xl p-3 text-white font-mono text-sm sm:text-base focus:outline-none focus:border-teal-500">
                                </div>
                            </div>

                            <div class="glass-panel p-4 sm:p-6 rounded-3xl flex flex-col justify-center space-y-3 sm:space-y-4 font-mono text-[11px] sm:text-xs text-zinc-400">
                                <div class="flex justify-between border-b border-white/5 pb-3"><span>Net Absolute Annual Delta:</span><span id="hikeAmt" class="text-indigo-400 font-bold text-xs sm:text-sm"></span></div>
                                <div class="flex justify-between pt-2 text-sm sm:text-base font-black"><span>Compounded Surge Velocity:</span><span id="hikePct" class="text-teal-400"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                renderBaseLayout(html);

                const currSal = document.getElementById('currSal'); const newSal = document.getElementById('newSal');

                function process() {
                    const currentVal = Number(currSal.value) || 0; const proposedVal = Number(newSal.value) || 0;
                    const deltaValue = proposedVal - currentVal; 
                    const grossPercentage = currentVal > 0 ? ((deltaValue / currentVal) * 100).toFixed(1) : '0.0';

                    document.getElementById('hikeAmt').textContent = formatMoney(deltaValue);
                    document.getElementById('hikePct').textContent = `${grossPercentage}%`;
                }

                [currSal, newSal].forEach(el => el.addEventListener('input', process)); process();
            }

            // Route Core Boot Trigger Execution Loop
            window.route('home');
        });
    </script>
</body>
</html>
