        :root {

        /* Dark Theme Variables */
        body.dark-theme {
            background-color: #030303;
            color: #f4f4f5;
        }
        body.dark-theme .glass-panel {
            background: rgba(15, 15, 23, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #f4f4f5;
        }
        body.dark-theme .glass-nav {
            background: rgba(3, 3, 3, 0.75);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        body.dark-theme .inner-pill-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        body.dark-theme .form-input-element {
            background: rgba(24, 24, 27, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        body.dark-theme .text-muted { color: #a1a1aa; }
        body.dark-theme .text-inverse { color: #ffffff; }

        /* Light Theme Variables */
        body.light-theme {
            background-color: #f8fafc;
            color: #0f172a;
        }
        body.light-theme .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            color: #0f172a;
        }
        body.light-theme .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
        }
        body.light-theme .inner-pill-box {
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(15, 23, 42, 0.06);
        }
        body.light-theme .form-input-element {
            background: rgba(255, 255, 255, 1);
            border: 1px solid rgba(15, 23, 42, 0.15);
            color: #0f172a;
        }
        body.light-theme .text-muted { color: #64748b; }
        body.light-theme .text-inverse { color: #0f172a; }

        .glass-panel {
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            transition: background 0.3s ease, border 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-nav {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background 0.3s ease, border 0.3s ease;
        }

        /* High-Performance Range Sliders Customization */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(100, 116, 139, 0.2);
            height: 6px;
            border-radius: 9999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transition: transform 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-element.active {
            opacity: 1;
            transform: translateY(0);
        }

                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.02 });
                
                elements.forEach(el => observer.observe(el));
            }

                    if (mode === 'FD') {
                        principal = v;
                        maturity = principal * Math.pow(1 + (r / 4), 4 * tVal);
                    } else {
                        const totalMonths = tVal * 12; principal = v * totalMonths;
                        let runningSum = 0;
                        for (let j = 1; j <= totalMonths; j++) {
                            runningSum += v * Math.pow(1 + (r / 4), 4 * ((totalMonths - j + 1) / 12));
                        }
                        maturity = runningSum;
                    }

                    const diffInterest = maturity - principal;
                    document.getElementById('pOut').textContent = formatMoney(principal);
                    document.getElementById('intOut').textContent = formatMoney(diffInterest);
                    document.getElementById('matOut').textContent = formatMoney(maturity);
                }

                btnFD.onclick = () => { mode = 'FD'; btnFD.className = 'flex-1 py-2 rounded-lg font-bold bg-fuchsia-500 text-black'; btnRD.className = 'flex-1 py-2 rounded-lg font-bold text-muted hover:text-inverse'; process(); };
                btnRD.onclick = () => { mode = 'RD'; btnRD.className = 'flex-1 py-2 rounded-lg font-bold bg-fuchsia-500 text-black'; btnFD.className = 'flex-1 py-2 rounded-lg font-bold text-muted hover:text-inverse'; process(); };

                [amt, rate, tenure].forEach(el => el.addEventListener('input', process)); process();
            }

            function renderTaxPanel() {
                const html = `
                    <div class="max-w-4xl mx-auto space-y-6 reveal-element">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                            <div>
                                <h1 class="text-2xl font-black text-inverse">${t('taxTitle')}</h1>
                                <p class="text-xs text-muted mt-1">${t('taxDesc')}</p>
                            </div>
                            <button onclick="window.route('home')" class="text-xs font-semibold px-4 py-2 border border-white/10 light:border-zinc-300 rounded-xl hover:bg-white/5 transition cursor-pointer text-inverse">${t('backHub')}</button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="glass-panel p-6 rounded-3xl space-y-4 flex flex-col justify-center">
                                <div>
                                    <label class="block text-xs font-bold tracking-wider font-mono text-muted uppercase mb-2">${t('totalGrossRev')}</label>
                                    <input id="grossInc" type="number" value="1800000" class="w-full form-input-element rounded-xl p-3 font-mono focus:outline-none focus:border-rose-500">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold tracking-wider font-mono text-muted uppercase mb-2">${t('statutoryDeduct')}</label>
                                    <input id="deduct" type="number" value="200000" class="w-full form-input-element rounded-xl p-3 font-mono focus:outline-none focus:border-rose-500">
                                </div>
                            </div>

                            <div class="glass-panel p-6 rounded-3xl flex flex-col justify-center space-y-4 font-mono text-xs text-muted">
                                <div class="flex justify-between border-b border-white/5 light:border-zinc-200 pb-3"><span>${t('adjNetTaxable')}</span><span id="taxNet" class="text-inverse font-bold"></span></div>
                                <div class="flex justify-between border-b border-white/5 light:border-zinc-200 pb-3"><span>${t('calcLiability')}</span><span id="taxDue" class="text-rose-500 font-bold"></span></div>
                                <div class="flex justify-between pt-2 text-base font-black"><span>${t('effectiveTakeHome')}</span><span id="takeHome" class="text-emerald-500"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                renderBaseLayout(html);

                const grossInc = document.getElementById('grossInc'); const deduct = document.getElementById('deduct');

                function process() {
                    const totalGross = Number(grossInc.value) || 0; const exemptions = Number(deduct.value) || 0;
                    const netIncome = Math.max(0, totalGross - exemptions);

                    let computedTax = 0;
                    if (currentCurrency === 'INR') {
                        if (netIncome > 1500000) computedTax += (netIncome - 1500000) * 0.30 + 150000;
                        else if (netIncome > 1200000) computedTax += (netIncome - 1200000) * 0.20 + 90000;
                        else if (netIncome > 900000) computedTax += (netIncome - 900000) * 0.15 + 45000;
                        else if (netIncome > 600000) computedTax += (netIncome - 600000) * 0.10 + 15000;
                        else if (netIncome > 300000) computedTax += (netIncome - 300000) * 0.05;
                    } else {
                        if (netIncome > 120000) computedTax += (netIncome - 120000) * 0.33 + 16000;
                        else if (netIncome > 60000) computedTax += (netIncome - 60000) * 0.20 + 4000;
                        else if (netIncome > 15000) computedTax += (netIncome - 15000) * 0.10;
                    }

                    document.getElementById('taxNet').textContent = formatMoney(netIncome);
                    document.getElementById('taxDue').textContent = formatMoney(computedTax);
                    document.getElementById('takeHome').textContent = formatMoney(totalGross - computedTax);
                }

                [grossInc, deduct].forEach(el => el.addEventListener('input', process)); process();
            }

            function renderHikePanel() {
                const html = `
                    <div class="max-w-4xl mx-auto space-y-6 reveal-element">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                            <div>
                                <h1 class="text-2xl font-black text-inverse">${t('hikeTitle')}</h1>
                                <p class="text-xs text-muted mt-1">${t('hikeDesc')}</p>
                            </div>
                            <button onclick="window.route('home')" class="text-xs font-semibold px-4 py-2 border border-white/10 light:border-zinc-300 rounded-xl hover:bg-white/5 transition cursor-pointer text-inverse">${t('backHub')}</button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="glass-panel p-6 rounded-3xl space-y-4 flex flex-col justify-center">
                                <div>
                                    <label class="block text-xs font-bold tracking-wider font-mono text-muted uppercase mb-2">${t('currBaseComp')}</label>
                                    <input id="currSal" type="number" value="800000" class="w-full form-input-element rounded-xl p-3 font-mono focus:outline-none focus:border-teal-500">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold tracking-wider font-mono text-muted uppercase mb-2">${t('proposedEval')}</label>
                                    <input id="newSal" type="number" value="1150000" class="w-full form-input-element rounded-xl p-3 font-mono focus:outline-none focus:border-teal-500">
                                </div>
                            </div>

                            <div class="glass-panel p-6 rounded-3xl flex flex-col justify-center space-y-4 font-mono text-xs text-muted">
                                <div class="flex justify-between border-b border-white/5 light:border-zinc-200 pb-3"><span>${t('netAbsAnnualDelta')}</span><span id="hikeAmt" class="text-indigo-500 font-bold text-sm"></span></div>
                                <div class="flex justify-between pt-2 text-base font-black"><span>${t('compoundedSurge')}</span><span id="hikePct" class="text-teal-500"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                renderBaseLayout(html);

                const currSal = document.getElementById('currSal'); const newSal = document.getElementById('newSal');

                function process() {
                    const currentVal = Number(currSal.value) || 0; const proposedVal = Number(newSal.value) || 0;
                    const deltaValue = proposedVal - currentVal; 
                    const grossPercentage = currentVal > 0 ? ((deltaValue / currentVal) * 100).toFixed(1) : '0.0';

                    document.getElementById('hikeAmt').textContent = formatMoney(deltaValue);
                    document.getElementById('hikePct').textContent = `${grossPercentage}%`;
                }

                [currSal, newSal].forEach(el => el.addEventListener('input', process)); process();
            }

            window.route('home');
        });
    </script>
</body>
</html>
