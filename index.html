<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Finance Tools - Global Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-white font-sans antialiased">
    <div id="root"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const rootContainer = document.getElementById('root');
            
            // Global State Configuration
            let currentCurrency = 'INR'; // Default to Indian Rupee (₹)
            
            const currencyConfigs = {
                USD: { symbol: '$', locale: 'en-US', defaultLoan: 500000, maxLoan: 2000000, stepLoan: 10000, defaultSalary: 80000, defaultNewSalary: 110000 },
                INR: { symbol: '₹', locale: 'en-IN', defaultLoan: 5000000, maxLoan: 20000000, stepLoan: 50000, defaultSalary: 600000, defaultNewSalary: 850000 },
                EUR: { symbol: '€', locale: 'de-DE', defaultLoan: 400000, maxLoan: 1500000, stepLoan: 10000, defaultSalary: 55000, defaultNewSalary: 75000 },
                GBP: { symbol: '£', locale: 'en-GB', defaultLoan: 400000, maxLoan: 1500000, stepLoan: 10000, defaultSalary: 50000, defaultNewSalary: 70000 }
            };

            function formatMoney(amount, currencyCode) {
                const config = currencyConfigs[currencyCode];
                return config.symbol + Math.round(amount).toLocaleString(config.locale);
            }

            // Core Layout Render
            function renderApp() {
                rootContainer.innerHTML = `
                    <div class="min-h-screen p-6 md:p-12 bg-zinc-950 bg-[radial-gradient(circle_at_50%_0%,rgba(99,102,241,0.12)_0%,transparent_50%)]">
                        
                        <nav class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center mb-12 border-b border-zinc-900 pb-6 gap-4">
                            <div class="font-bold text-xl tracking-tight text-indigo-400">NEXUS.FINANCE</div>
                            
                            <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 p-1.5 rounded-xl">
                                <span class="text-xs text-zinc-400 font-medium px-2">Select Currency:</span>
                                <select id="currencySelector" class="bg-zinc-950 text-white font-mono text-sm rounded-lg border border-zinc-800 px-3 py-1 focus:outline-none focus:border-indigo-500 cursor-pointer">
                                    <option value="INR" ${currentCurrency === 'INR' ? 'selected' : ''}>INR (₹) Rupee</option>
                                    <option value="USD" ${currentCurrency === 'USD' ? 'selected' : ''}>USD ($) Dollar</option>
                                    <option value="EUR" ${currentCurrency === 'EUR' ? 'selected' : ''}>EUR (€) Euro</option>
                                    <option value="GBP" ${currentCurrency === 'GBP' ? 'selected' : ''}>GBP (£) Pound</option>
                                </select>
                            </div>
                        </nav>
                        
                        <main class="max-w-7xl mx-auto grid grid-cols-1 gap-12">
                            <section class="bg-zinc-900/40 border border-zinc-800 p-6 rounded-2xl">
                                <h2 class="text-xl font-bold mb-6 text-indigo-400">01 / Universal EMI Structure Simulation</h2>
                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div class="flex flex-col gap-6">
                                        <div>
                                            <div class="flex justify-between mb-2">
                                                <label class="text-sm text-zinc-400">Loan Amount</label>
                                                <span id="loanVal" class="text-indigo-400 font-bold font-mono"></span>
                                            </div>
                                            <input id="loanSlider" type="range" class="w-full accent-indigo-500 cursor-pointer">
                                        </div>
                                        <div>
                                            <div class="flex justify-between mb-2">
                                                <label class="text-sm text-zinc-400">Annual Interest Rate (% P.A.)</label>
                                                <span id="rateVal" class="text-emerald-400 font-bold font-mono">8.5%</span>
                                            </div>
                                            <input id="rateSlider" type="range" min="1" max="20" step="0.1" value="8.5" class="w-full accent-emerald-500 cursor-pointer">
                                        </div>
                                        <div>
                                            <div class="flex justify-between mb-2">
                                                <label class="text-sm text-zinc-400">Duration Period</label>
                                                <span id="tenureVal" class="text-violet-400 font-bold font-mono">20 Years</span>
                                            </div>
                                            <input id="tenureSlider" type="range" min="1" max="30" step="1" value="20" class="w-full accent-violet-500 cursor-pointer">
                                        </div>
                                    </div>
                                    <div class="bg-zinc-950 p-6 rounded-xl border border-zinc-800 flex flex-col justify-center items-center sm:items-start">
                                        <p class="text-xs text-zinc-500 uppercase tracking-wider">Estimated Monthly EMI</p>
                                        <p id="emiDisplay" class="text-4xl font-extrabold text-indigo-400 font-mono mt-2"></p>
                                    </div>
                                </div>
                            </section>

                            <section class="bg-zinc-900/40 border border-zinc-800 p-6 rounded-2xl">
                                <h2 class="text-xl font-bold mb-6 text-emerald-400">02 / Revenue Growth & Hike Optimizer</h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label id="currSalaryLabel" class="block text-sm text-zinc-400 mb-2"></label>
                                        <input id="currSalary" type="number" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-mono focus:outline-none focus:border-indigo-500">
                                    </div>
                                    <div>
                                        <label id="newSalaryLabel" class="block text-sm text-zinc-400 mb-2"></label>
                                        <input id="newSalary" type="number" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-mono focus:outline-none focus:border-emerald-500">
                                    </div>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                                    <div class="bg-zinc-950 border border-zinc-800 p-5 rounded-xl">
                                        <p class="text-xs text-zinc-500 uppercase tracking-wider">Net Surge Percentage</p>
                                        <p id="hikePercent" class="text-3xl font-bold font-mono text-emerald-400 mt-2">0.0%</p>
                                    </div>
                                    <div class="bg-zinc-950 border border-zinc-800 p-5 rounded-xl">
                                        <p class="text-xs text-zinc-500 uppercase tracking-wider">Annual Delta Gain</p>
                                        <p id="hikeDiff" class="text-3xl font-bold font-mono text-indigo-400 mt-2"></p>
                                    </div>
                                </div>
                            </section>
                        </main>
                    </div>
                `;

                setupEventListeners();
                resetSlidersForCurrency();
            }

            function resetSlidersForCurrency() {
                const config = currencyConfigs[currentCurrency];
                
                const loanSlider = document.getElementById('loanSlider');
                loanSlider.min = config.stepLoan;
                loanSlider.max = config.maxLoan;
                loanSlider.step = config.stepLoan;
                loanSlider.value = config.defaultLoan;

                document.getElementById('currSalary').value = config.defaultSalary;
                document.getElementById('newSalary').value = config.defaultNewSalary;

                document.getElementById('currSalaryLabel').textContent = `Current Annual Base (${config.symbol})`;
                document.getElementById('newSalaryLabel').textContent = `New Proposed Annual Base (${config.symbol})`;

                calculateMetrics();
            }

            function calculateMetrics() {
                const config = currencyConfigs[currentCurrency];
                
                // EMI Math Calculations
                const loanSlider = document.getElementById('loanSlider');
                const rateSlider = document.getElementById('rateSlider');
                const tenureSlider = document.getElementById('tenureSlider');

                const P = Number(loanSlider.value);
                const annualR = Number(rateSlider.value);
                const N = Number(tenureSlider.value) * 12;
                const R = annualR / 12 / 100;

                document.getElementById('loanVal').textContent = formatMoney(P, currentCurrency);
                document.getElementById('rateVal').textContent = `${annualR}%`;
                document.getElementById('tenureVal').textContent = `${tenureSlider.value} Years`;

                let emi = R > 0 ? (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1) : P / N;
                document.getElementById('emiDisplay').textContent = formatMoney(emi || 0, currentCurrency);

                // Salary Hike Calculations
                const current = Number(document.getElementById('currSalary').value) || 0;
                const proposed = Number(document.getElementById('newSalary').value) || 0;
                const diff = proposed - current;
                const pct = current > 0 ? ((diff / current) * 100).toFixed(1) : '0.0';

                document.getElementById('hikePercent').textContent = `${pct}%`;
                
                const hikeDiffEl = document.getElementById('hikeDiff');
                if (diff >= 0) {
                    hikeDiffEl.textContent = formatMoney(diff, currentCurrency);
                    hikeDiffEl.className = "text-3xl font-bold font-mono text-indigo-400 mt-2";
                } else {
                    hikeDiffEl.textContent = "-" + formatMoney(Math.abs(diff), currentCurrency);
                    hikeDiffEl.className = "text-3xl font-bold font-mono text-rose-500 mt-2";
                }
            }

            function setupEventListeners() {
                document.getElementById('currencySelector').addEventListener('change', (e) => {
                    currentCurrency = e.target.value;
                    resetSlidersForCurrency();
                });

                document.getElementById('loanSlider').addEventListener('input', calculateMetrics);
                document.getElementById('rateSlider').addEventListener('input', calculateMetrics);
                document.getElementById('tenureSlider').addEventListener('input', calculateMetrics);
                document.getElementById('currSalary').addEventListener('input', calculateMetrics);
                document.getElementById('newSalary').addEventListener('input', calculateMetrics);
            }

            // Initial Core Run
            renderApp();
        });
    </script>
</body>
</html>
