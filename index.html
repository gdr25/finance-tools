<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzio Premium Finance Suite | Global Dashboard</title>
    
    <meta name="description" content="Optimize asset metrics with the Calzio high-performance global calculation engine. Featuring glassmorphic dashboards, live currency modules, real-time analytics, and investment optimization models.">
    <meta name="keywords" content="EMI Calculator, SIP Calculator, GST Calculator, Finance Dashboard, Tax Planning, Forex Engine, Fixed Deposit, Wealth Management">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        :root {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Light/Dark mode state control logic variables mapping */
        body.dark {
            --bg-master: #030303;
            --text-master: #f4f4f5;
            --glass-bg: rgba(15, 15, 23, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --nav-bg: rgba(3, 3, 3, 0.8);
            --panel-inner: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(24, 24, 27, 0.6);
            --text-muted: #a1a1aa;
        }

        body.light {
            --bg-master: #f8fafc;
            --text-master: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(15, 23, 42, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --panel-inner: rgba(241, 245, 249, 0.9);
            --input-bg: rgba(255, 255, 255, 0.9);
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-master);
            color: var(--text-master);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
        }

        .glass-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }

        .inner-panel {
            background: var(--panel-inner);
        }

        .themed-input {
            background: var(--input-bg);
            color: var(--text-master);
            border: 1px solid var(--glass-border);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(120, 119, 119, 0.15);
            height: 8px;
            border-radius: 9999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transition: transform 0.15s ease;
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-element.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .voice-pulse {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="dark antialiased selection:bg-indigo-500/30">
    <div id="app-root"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const root = document.getElementById('app-root');
            
            // App Layout Architecture & Global States
            let currentPage = 'home'; 
            let currentCurrency = 'INR';
            let globalChartInstance = null;
            let currentLang = 'EN';
            let activeSpeechInputId = null;

            const currencyConfigs = {
                INR: { symbol: '₹', locale: 'en-IN', rateVsUSD: 83.50 },
                USD: { symbol: '$', locale: 'en-US', rateVsUSD: 1.00 },
                EUR: { symbol: '€', locale: 'de-DE', rateVsUSD: 0.92 },
                GBP: { symbol: '£', locale: 'en-GB', rateVsUSD: 0.79 }
            };

            // Multi-Language Localization Framework Dictionaries
            const i18n = {
                EN: {
                    tagline: "Institutional Level Financial Optimization Engine",
                    heroTitle: "Computational Strategy For Accelerated Wealth Decisions",
                    heroDesc: "Simulate asset trajectories, tax models, and mortgage scenarios with elite sub-millisecond mathematical rendering and visual analytics.",
                    modulesTitle: "01 / Operational Modules",
                    navHome: "HOME", navEmi: "EMI LOAN", navSip: "SIP WEALTH", navGst: "GST MATRIX", navForex: "FOREX", navDebt: "DEBT CAP", navTerm: "FD/RD TERM", navTax: "FISCAL BRACKET", navHike: "SALARY HIKE",
                    downPdf: "Download PDF", shareResult: "Share Link", emailResult: "Email Results", voicePrompt: "Listening for numbers...",
                    smartSugg: "Auto Suggestions Available"
                },
                ES: {
                    tagline: "Motor de Optimización Financiera a Nivel Institucional",
                    heroTitle: "Estrategia Computacional para Decisiones de Riqueza Aceleradas",
                    heroDesc: "Simule trayectorias de activos, modelos fiscales y escenarios hipotecarios con renderizado matemático de élite de milisegundos y análisis visual.",
                    modulesTitle: "01 / Módulos Operativos",
                    navHome: "INICIO", navEmi: "PRESTAMO EMI", navSip: "SIP RIQUEZA", navGst: "MATRIZ IVA", navForex: "DIVISAS", navDebt: "CAP DEUDA", navTerm: "PLAZO FD/RD", navTax: "TRAMO FISCAL", navHike: "ALZA SALARIAL",
                    downPdf: "Descargar PDF", shareResult: "Compartir enlace", emailResult: "Enviar Correo", voicePrompt: "Escuchando números...",
                    smartSugg: "Sugerencias Automáticas Disponibles"
                },
                FR: {
                    tagline: "Moteur d'Optimisation Financière de Niveau Institutionnel",
                    heroTitle: "Stratégie Computationnelle pour des Décisions de Richesse Accélérées",
                    heroDesc: "Simulez des trajectoires d'actifs, des modèles fiscaux et des scénarios hypothécaires avec un rendu mathématique d'élite et des analyses visuelles.",
                    modulesTitle: "01 / Modules Opérationnels",
                    navHome: "ACCUEIL", navEmi: "PRÊT EMI", navSip: "SIP PATRIMOINE", navGst: "MATRICE TVA", navForex: "FOREX", navDebt: "CAP DETTE", navTerm: "TERME FD/RD", navTax: "TRANCHE FISCALE", navHike: "HAUSSE SALAIRE",
                    downPdf: "Télécharger PDF", shareResult: "Partager", emailResult: "Envoyer l'E-mail", voicePrompt: "Écoute des numéros...",
                    smartSugg: "Suggestions Automatiques Disponibles"
                }
            };

            function formatMoney(amount) {
                const config = currencyConfigs[currentCurrency];
                return config.symbol + Math.round(amount).toLocaleString(config.locale);
            }

            // Global Master Layout Template Builder Injection Frame
            function renderBaseLayout(innerContentHTML) {
                const t = i18n[currentLang];
                const isDark = document.body.classList.contains('dark');

                root.innerHTML = `
                    <div class="fixed top-0 left-1/4 w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] bg-indigo-600/10 rounded-full blur-[100px] sm:blur-[140px] pointer-events-none -z-10"></div>
                    <div class="fixed bottom-12 right-1/4 w-[250px] sm:w-[400px] h-[250px] sm:h-[400px] bg-emerald-600/5 rounded-full blur-[90px] sm:blur-[120px] pointer-events-none -z-10"></div>

                    <header class="sticky top-0 w-full glass-nav z-50 transition-all duration-300">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div class="flex items-center gap-2 sm:gap-3 font-extrabold text-base sm:text-xl tracking-tight bg-gradient-to-r from-indigo-500 via-indigo-300 to-emerald-400 bg-clip-text text-transparent cursor-pointer" id="logoClick">
                                <span class="p-1.5 sm:p-2 bg-indigo-600/20 border border-indigo-500/30 rounded-xl text-indigo-400 text-xs sm:text-sm">CZ</span> CALZIO
                            </div>
                            
                            <nav class="hidden xl:flex items-center gap-1 bg-zinc-900/10 dark:bg-zinc-900/40 p-1 rounded-xl border border-black/5 dark:border-white/5 backdrop-blur-md">
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'home' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('home')">${t.navHome}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'emi' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('emi')">${t.navEmi}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'sip' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('sip')">${t.navSip}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'gst' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('gst')">${t.navGst}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'converter' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('converter')">${t.navForex}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'eligibility' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('eligibility')">${t.navDebt}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'fdrd' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('fdrd')">${t.navTerm}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'tax' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('tax')">${t.navTax}</button>
                                <button class="px-2.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer ${currentPage === 'hike' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-zinc-500 dark:text-zinc-400 hover:text-indigo-500'}" onclick="window.navigateRoute('hike')">${t.navHike}</button>
                            </nav>

                            <div class="flex items-center gap-2 sm:gap-3">
                                <button id="themeToggle" class="p-2 border border-black/10 dark:border-white/10 rounded-xl text-sm w-9 h-9 flex items-center justify-center cursor-pointer hover:bg-zinc-500/10 transition" title="Toggle Light/Dark Theme">
                                    ${isDark ? '☀️' : '🌙'}
                                </button>
                                
                                <select id="langSelect" class="bg-zinc-100 dark:bg-zinc-900 border border-black/10 dark:border-white/10 rounded-xl text-xs font-bold px-2 py-2 focus:outline-none transition cursor-pointer">
                                    <option value="EN" ${currentLang === 'EN' ? 'selected' : ''}>EN</option>
                                    <option value="ES" ${currentLang === 'ES' ? 'selected' : ''}>ES</option>
                                    <option value="FR" ${currentLang === 'FR' ? 'selected' : ''}>FR</option>
                                </select>

                                <select id="currSelect" class="bg-zinc-100 dark:bg-zinc-900 border border-black/10 dark:border-white/10 rounded-xl text-xs font-mono px-2 py-2 focus:outline-none transition cursor-pointer">
                                    <option value="INR" ${currentCurrency === 'INR' ? 'selected' : ''}>INR (₹)</option>
                                    <option value="USD" ${currentCurrency === 'USD' ? 'selected' : ''}>USD ($)</option>
                                    <option value="EUR" ${currentCurrency === 'EUR' ? 'selected' : ''}>EUR (€)</option>
                                    <option value="GBP" ${currentCurrency === 'GBP' ? 'selected' : ''}>GBP (£)</option>
                                </select>
                                <button class="xl:hidden bg-zinc-100 dark:bg-zinc-900 border border-black/10 dark:border-white/10 p-2 rounded-xl text-sm w-9 h-9 flex items-center justify-center cursor-pointer" id="mobileMenuToggle">☰</button>
                            </div>
                        </div>
                    </header>

                    <div id="mobileMenuPanel" class="hidden fixed top-20 left-0 w-full max-h-[calc(100vh-5rem)] overflow-y-auto bg-slate-50/95 dark:bg-zinc-950/95 backdrop-blur-xl border-b border-black/5 dark:border-white/5 z-40 p-4 font-semibold text-xs sm:text-sm shadow-2xl">
                        <div class="grid grid-cols-2 gap-2">
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'home' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('home')">${t.navHome}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'emi' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('emi')">${t.navEmi}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'sip' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('sip')">${t.navSip}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'gst' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('gst')">${t.navGst}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'converter' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('converter')">${t.navForex}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'eligibility' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('eligibility')">${t.navDebt}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'fdrd' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('fdrd')">${t.navTerm}</button>
                            <button class="text-left p-3 rounded-xl transition ${currentPage === 'tax' ? 'bg-indigo-600 text-white' : 'bg-black/5 dark:bg-white/5 text-zinc-500'}" onclick="window.navigateRoute('tax')">${t.navTax}</button>
                            <button class="text-center p-3 rounded-xl transition col-span-2 bg-indigo-600 text-white" onclick="window.navigateRoute('hike')">${t.navHike}</button>
                        </div>
                    </div>

                    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-8" id="exportablePdfArea">
                        ${innerContentHTML}
                    </main>

                    <footer class="border-t border-black/5 dark:border-white/5 py-6 sm:py-8 px-4 text-center text-[10px] sm:text-xs text-zinc-400 font-mono tracking-wider">
                        &copy; 2026 CALZIO FINANCIAL SOFTWARE SUITE APPARATUS. POWERED BY STATIC HTML5 FAST RUNTIME ENGINES.
                    </footer>
                `;

                // Wire up core handlers
                document.getElementById('logoClick').onclick = () => window.navigateRoute('home');
                document.getElementById('currSelect').onchange = (e) => {
                    currentCurrency = e.target.value;
                    window.navigateRoute(currentPage);
                };
                document.getElementById('langSelect').onchange = (e) => {
                    currentLang = e.target.value;
                    window.navigateRoute(currentPage);
                };
                document.getElementById('themeToggle').onclick = () => {
                    document.body.classList.toggle('dark');
                    document.body.classList.toggle('light');
                    window.navigateRoute(currentPage);
                };
                
                const mToggle = document.getElementById('mobileMenuToggle');
                const mPanel = document.getElementById('mobileMenuPanel');
                if (mToggle && mPanel) {
                    mToggle.onclick = () => mPanel.classList.toggle('hidden');
                }

                setTimeout(initScrollReveal, 40);
                setupSmartSuggestions();
            }

            window.navigateRoute = function(targetPage) {
                const mPanel = document.getElementById('mobileMenuPanel');
                if (mPanel) mPanel.classList.add('hidden');
                window.route(targetPage);
            };

            window.route = function(targetPage) {
                currentPage = targetPage;
                if (globalChartInstance) {
                    globalChartInstance.destroy();
                    globalChartInstance = null;
                }
                
                window.scrollTo({ top: 0, behavior: 'smooth' });

                if (targetPage === 'home') renderHomePage();
                else if (targetPage === 'emi') renderEMIPanel();
                else if (targetPage === 'sip') renderSIPPanel();
                else if (targetPage === 'gst') renderGSTPanel();
                else if (targetPage === 'converter') renderConverterPanel();
                else if (targetPage === 'eligibility') renderEligibilityPanel();
                else if (targetPage === 'fdrd') renderFDRDPanel();
                else if (targetPage === 'tax') renderTaxPanel();
                else if (targetPage === 'hike') renderHikePanel();
            };

            function initScrollReveal() {
                const elements = document.querySelectorAll('.reveal-element');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('active');
                    });
                }, { threshold: 0.05 });
                elements.forEach(el => observer.observe(el));
            }

            function mountChartCanvas(p, y, pLabel = "Principal Base", yLabel = "Yield Return Pool") {
                setTimeout(() => {
                    const ctx = document.getElementById('dashboardChart');
                    if (!ctx) return;
                    globalChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: [pLabel, yLabel],
                            datasets: [{
                                data: [p, y],
                                backgroundColor: ['#6366f1', '#10b981'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            cutout: '75%'
                        }
                    });
                }, 60);
            }

            function animateNumericValue(elementId, endValue, prefix = '') {
                const el = document.getElementById(elementId);
                if (!el) return;
                el.textContent = prefix + endValue.toLocaleString();
            }

            // ========================================================
            // SMART FUNCTIONAL EXTRA LAYERS (EXPORT, VOICE, SHARE)
            // ========================================================
            
            // Feature: Voice Input Processing Handler Using Native Web Speech API Engine
            window.toggleVoiceInput = function(targetInputId) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Web Speech Voice Engine API not supported on this browser architecture pipeline.");
                    return;
                }
                
                const btn = document.getElementById('voice-btn-' + targetInputId);
                if (activeSpeechInputId === targetInputId) {
                    activeSpeechInputId = null;
                    btn.classList.remove('voice-pulse', 'bg-red-500');
                    return;
                }

                activeSpeechInputId = targetInputId;
                const recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = currentLang === 'EN' ? 'en-US' : currentLang === 'ES' ? 'es-ES' : 'fr-FR';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                btn.classList.add('voice-pulse', 'bg-red-500');

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    // Filter numeric tokens out of natural voice language arrays
                    const cleanNumeric = transcript.replace(/[^0-9.]/g, '');
                    if (cleanNumeric) {
                        const targetInput = document.getElementById(targetInputId);
                        targetInput.value = cleanNumeric;
                        // Trigger synthetic reactive event notification cycle
                        targetInput.dispatchEvent(new Event('input'));
                    }
                };

                recognition.onend = () => {
                    btn.classList.remove('voice-pulse', 'bg-red-500');
                    activeSpeechInputId = null;
                };
                
                recognition.onerror = () => {
                    btn.classList.remove('voice-pulse', 'bg-red-500');
                    activeSpeechInputId = null;
                };

                recognition.start();
            };

            // Feature: Auto Suggestions Utility Setup Hook Engine
            function setupSmartSuggestions() {
                document.querySelectorAll('.suggest-input').forEach(input => {
                    const id = input.id;
                    const container = document.getElementById('sugg-' + id);
                    if (!container) return;

                    input.addEventListener('focus', () => {
                        const currentVal = parseFloat(input.value) || 1000;
                        container.innerHTML = `
                            <div class="absolute left-0 right-0 top-full mt-1 bg-white dark:bg-zinc-900 border border-black/10 dark:border-white/10 rounded-xl p-2 z-50 text-[11px] font-mono shadow-xl grid grid-cols-3 gap-1">
                                <button class="p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(currentVal * 0.5)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">50% (-)</button>
                                <button class="p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(currentVal * 1.5)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">1.5x (+)</button>
                                <button class="p-1 hover:bg-indigo-600 hover:text-white rounded transition" onclick="document.getElementById('${id}').value=${Math.round(currentVal * 2)}; document.getElementById('${id}').dispatchEvent(new Event('input'));">2x (Double)</button>
                            </div>
                        `;
                    });

                    input.addEventListener('blur', () => {
                        setTimeout(() => container.innerHTML = '', 250);
                    });
                });
            }

            // Feature: Download Results as PDF via Local Screen Capture Buffer 
            window.exportOutputToPdf = function() {
                const element = document.getElementById('exportablePdfArea');
                const options = {
                    margin: 0.2,
                    filename: `Calzio_Analysis_Report_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, backgroundColor: document.body.classList.contains('dark') ? '#030303' : '#f8fafc' },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().from(element).set(options).save();
            };

            // Capture context payload string out of dashboard state models
            function getCalculationTextPayload() {
                return `Calzio Premium Financial Analytics Audit: Processed via active metrics in ${currentCurrency} currency base models. Terminal verification verified.`;
            }

            // Feature: Share calculation values via System Native Dialog Framework
            window.shareCoreAppResults = function() {
                const txt = getCalculationTextPayload();
                if (navigator.share) {
                    navigator.share({ title: 'Calzio Financial Metrics', text: txt, url: window.location.href });
                } else {
                    navigator.clipboard.writeText(txt + ' ' + window.location.href);
                    alert("Analysis copied directly to secure buffer clipboard array system.");
                }
            };

            // Feature: Email calculation summaries
            window.emailCoreAppResults = function() {
