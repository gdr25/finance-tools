    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            font-family: 'Plus Jakarta Sans', sans-serif;
            --bg-master: #030303;
            --text-master: #f4f4f5;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(15, 15, 23, 0.45);
            --glass-nav: rgba(3, 3, 3, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --panel-inner: rgba(0, 0, 0, 0.4);
        }

        .light-mode-vars {
            --bg-master: #f8fafc;
            --text-master: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-nav: rgba(248, 250, 252, 0.8);
            --glass-border: rgba(15, 23, 42, 0.08);
            --panel-inner: rgba(15, 23, 42, 0.04);
        }
        
        body {
            background-color: var(--bg-master);
            color: var(--text-master);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Premium Glassmorphic Styles */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
        }

        .glass-nav {
            background: var(--glass-nav);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        /* Customized High-Performance Range Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(120, 119, 198, 0.2);
            height: 6px;
            border-radius: 9999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transition: transform 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Scroll Reveal and Custom Smooth Animation System */
        .reveal-element {
            opacity: 0;
            transform: translateY(24px);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-element.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

                currentTheme = currentTheme === 'dark' ? 'light' : 'dark';

            // High-Performance Engine Core Mathematical Log History Store
            function saveCalculationToLog(moduleName, parameters, primaryResult) {
                const item = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleTimeString(),
                    module: moduleName,
                    details: parameters,
                    result: primaryResult
                };
                calculationHistory.unshift(item);
                if (calculationHistory.length > 6) calculationHistory.pop();
                localStorage.setItem('nexus_history', JSON.stringify(calculationHistory));
                renderHistoryWidget();
            }

            // Native Web Voice Synthesis and Audio Recognition Parser
            function initializeVoiceCaptureInput(targetInputElementId, transformationCallback) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Speech Architecture Interface is missing or blocked inside this environment sandbox.");
                    return;
                }
                const recognition = new SpeechRecognition();
                recognition.lang = currentLanguage === 'EN' ? 'en-US' : currentLanguage === 'ES' ? 'es-ES' : 'fr-FR';
                recognition.start();
                recognition.onresult = function(event) {
                    const speechToText = event.results[0][0].transcript;
                    const cleanedDigits = speechToText.replace(/[^0-9.]/g, '');
                    if(cleanedDigits) {
                        const targetEl = document.getElementById(targetInputElementId);
                        if(targetEl) {
                            targetEl.value = cleanedDigits;
                            transformationCallback();
                        }
                    }
                };
            }

            // Secure Direct Client Data Transfer Transmission Engines
            function dispatchNativeShareIntent(title, summaryString) {
                if (navigator.share) {
                    navigator.share({ title: title, text: summaryString, url: window.location.href })
                        .catch(() => fallbackClipboardCopy(summaryString));
                } else {
                    fallbackClipboardCopy(summaryString);
                }
            }

            function fallbackClipboardCopy(text) {
                navigator.clipboard.writeText(text);
                alert("🚀 Calculation packet copied to secure clip layer.");
            }

                    doc.text(`${record.label}:`, 15, verticalOffset);
                    doc.setFont("Helvetica", "normal");
                    doc.text(`${record.value}`, 75, verticalOffset);
                    verticalOffset += 10;
                });
                
                doc.save(`Nexus-Financial-Capture-${Date.now()}.pdf`);

                    </header>

                    <div id="mobileMenuPanel" class="hidden fixed top-20 left-0 w-full bg-zinc-950/95 backdrop-blur-xl border-b border-white/5 z-40 p-6 space-y-3 font-semibold text-sm">

                        &copy; 2026 NEXUS FINANCIAL SOFTWARE SUITE APPARATUS. POWERED BY STATIC HTML5 FAST RUNTIME ENGINES.

            function initScrollReveal() {
                const elements = document.querySelectorAll('.reveal-element');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('active');
                    });
                }, { threshold: 0.05 });
                elements.forEach(el => observer.observe(el));
            }

            function mountChartCanvas(principal, yieldVal, principalLabel = "Principal Base", yieldLabel = "Yield Return Pool") {
                setTimeout(() => {
                    const ctx = document.getElementById('dashboardChart');
                    if (!ctx) return;
                    globalChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: [principalLabel, yieldLabel],
                            datasets: [{
                                data: [principal, yieldVal],
                                backgroundColor: ['#6366f1', '#10b981'],
                                hoverBackgroundColor: ['#4f46e5', '#059669'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            cutout: '75%'
                        }
                    });
                }, 60);
            }

            function animateNumericValue(elementId, endValue, prefix = '') {
                const el = document.getElementById(elementId);
                if (!el) return;
                let start = 0; const duration = 800; const startTime = performance.now();
                function updateCounter(currentTime) {
                    const elapsedTime = currentTime - startTime;
                    if (elapsedTime >= duration) {
                        el.textContent = prefix + endValue.toLocaleString();
                        return;
                    }
                    const progress = elapsedTime / duration;
                    const easeOutQuad = progress * (2 - progress);
                    const currentVal = Math.floor(start + (endValue - start) * easeOutQuad);
                    el.textContent = prefix + currentVal.toLocaleString();
                    requestAnimationFrame(updateCounter);
                }
                requestAnimationFrame(updateCounter);
            }

            // Subroutine Widget Blocks for Smart Engine Configurations
            function renderHistoryWidget() {
                const node = document.getElementById('historyAnchor');
                if (!node) return;
                if (calculationHistory.length === 0) {
                    node.innerHTML = `<h3 class="text-xs font-bold font-mono text-zinc-400 uppercase tracking-widest mb-2">${t('history')}</h3>
                                      <p class="text-xs text-zinc-500 font-mono">Log stream execution pipeline clear.</p>`;
                    return;
                }
                let linesHTML = '';
                calculationHistory.forEach(h => {
                    linesHTML += `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 py-2 text-xs font-mono">
                            <div>
                                <span class="text-indigo-400 font-bold">[${h.timestamp}]</span>
                                <span class="text-white font-semibold ml-1 uppercase">${h.module}:</span>
                                <span class="text-zinc-400 ml-2 text-[11px]">${h.details}</span>
                            </div>
                            <span class="text-emerald-400 font-bold mt-1 sm:mt-0">${h.result}</span>
                        </div>
                    `;
                });
                node.innerHTML = `<h3 class="text-xs font-bold font-mono text-zinc-400 uppercase tracking-widest mb-3">${t('history')}</h3>
                                  <div class="space-y-1 max-h-48 overflow-y-auto">${linesHTML}</div>`;
            }

            function generatePredictiveAITips() {
                const node = document.getElementById('aiTipsAnchor');
                if (!node) return;
                const strategicTipsPool = [
                    "Asset allocations matching current liquidity thresholds suggest scaling high-duration structures to compound long-range yields.",
                    "Optimizing tax liabilities through progressive diversification methods could potentially reduce fiscal outlays by up to 12%.",
                    "A balanced debt capacity ceiling (FOIR) protects working reserve equity during unexpected market volatility cycles.",
                    "Systematic index accumulation strategies demonstrate optimal return velocity patterns during intermediate market consolidations."
                ];
                const selectedTip = strategicTipsPool[Math.floor(Math.random() * strategicTipsPool.length)];
                node.innerHTML = `
                    <h3 class="text-xs font-bold font-mono text-zinc-400 uppercase tracking-widest mb-2">💡 ${t('aiTips')}</h3>
                    <p class="text-xs text-zinc-400 leading-relaxed italic font-mono">"${selectedTip}"</p>
                `;
            }

            function processValueAutoSuggestion(enteredValue, suggestionBoxId, targetInputElementId, implementationCallback) {
